services:
  synapse-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: synapse-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      SYNAPSE_VOLUME_DIR: /data
    depends_on:
      - voice-bridge
    volumes:
      - synapse-data:/data

  voice-bridge:
    build:
      context: .
      dockerfile: apps/voice-bridge/Dockerfile
    image: synapse-voice:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      VOICE_BRIDGE_PORT: "8080"
      LOG_LEVEL: "info"

volumes:
  synapse-data:
