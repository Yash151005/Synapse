services:
  synapse-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: synapse-web:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      SYNAPSE_VOLUME_DIR: /data
    volumes:
      - ${SYNAPSE_VOLUME_HOST_PATH:-synapse-data}:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  synapse-data:
